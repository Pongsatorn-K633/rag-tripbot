<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Explore!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    display: grid;
    place-items: center;
    background: #f5f5f7;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter",
      "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* soft neutral pastel blobs drifting behind, so the glass has something to refract */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 {
    width: 420px; height: 420px;
    top: 12%; left: 18%;
    background: rgba(165, 216, 255, 0.55);
    animation: drift1 14s ease-in-out infinite alternate;
  }
  .blob-2 {
    width: 380px; height: 380px;
    bottom: 14%; right: 16%;
    background: rgba(178, 240, 214, 0.5);
    animation: drift2 17s ease-in-out infinite alternate;
  }
  .blob-3 {
    width: 300px; height: 300px;
    bottom: 20%; left: 30%;
    background: rgba(255, 214, 186, 0.45);
    animation: drift1 20s ease-in-out infinite alternate-reverse;
  }
  @keyframes drift1 {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(60px, -40px) scale(1.12); }
  }
  @keyframes drift2 {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(-70px, 40px) scale(1.08); }
  }

  .stage { position: relative; display: grid; place-items: center; z-index: 1; }

  /* purple bloom that only fades in on hover */
  .stage::before {
    content: "";
    position: absolute;
    inset: -170px;
    background: radial-gradient(closest-side, rgba(91, 136, 178, 0.28), transparent 72%);
    opacity: 0;
    transition: opacity 0.45s ease;
    pointer-events: none;
  }
  .stage:hover::before { opacity: 1; }

  .glass-btn {
    position: relative;
    appearance: none;
    cursor: pointer;
    padding: 30px 64px;
    font-size: 40px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: #101014;
    border-radius: 999px; /* capsule / pill */
    overflow: hidden;

    /* glass-card setting, adapted to the button */
    background: rgba(255, 255, 255, 0.15);
    -webkit-backdrop-filter: blur(18px);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.1),
      inset 0 1px 0 rgba(255, 255, 255, 0.5),
      inset 0 -1px 0 rgba(255, 255, 255, 0.1),
      inset 0 0 20px 10px rgba(255, 255, 255, 1);

    transition:
      transform 0.35s cubic-bezier(0.2, 0.7, 0.2, 1),
      box-shadow 0.35s ease,
      background 0.35s ease;
  }

  /* top edge highlight */
  .glass-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.8),
      transparent
    );
  }

  /* left edge highlight */
  .glass-btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 1px;
    height: 100%;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.8),
      transparent,
      rgba(255, 255, 255, 0.3)
    );
  }

  .glass-btn:hover {
    transform: translateY(-2px);
    background: rgba(91, 136, 178, 0.20);
    box-shadow:
      0 8px 32px rgba(91, 136, 178, 0.22),
      0 24px 60px rgba(91, 136, 178, 0.28),
      inset 0 1px 0 rgba(255, 255, 255, 0.5),
      inset 0 -1px 0 rgba(255, 255, 255, 0.1),
      inset 0 0 20px 10px rgba(255, 255, 255, 1);
  }
  .glass-btn:active { transform: translateY(0) scale(0.985); }
</style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="stage">
    <button class="glass-btn">Explore!</button>
  </div>
</body>
</html>
