<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamburger &rarr; Cross</title>
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
  }

  .icon {
    position: relative;
    width: 60px;
    height: 60px;
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .icon .bar {
    position: absolute;
    left: 0;
    top: 50%;
    width: 60px;
    height: 5px;
    margin-top: -2.5px;
    border-radius: 2.5px;
    background: #916974;
    transition:
      transform 200ms cubic-bezier(.33, 1, .68, 1),
      opacity   200ms linear;
    will-change: transform, opacity;
  }
  /* hamburger: three bars, 25px apart */
  .icon .b1 { transform: translateY(-25px) rotate(0deg); }
  .icon .b2 { transform: translateY(0)     rotate(0deg); opacity: 1; }
  .icon .b3 { transform: translateY(25px)  rotate(0deg); }
  /* cross: outer bars glide to center while rotating, middle fades */
  .icon.open .b1 { transform: translateY(0) rotate(-45deg); }
  .icon.open .b2 { transform: translateY(0) rotate(0deg); opacity: 0; }
  .icon.open .b3 { transform: translateY(0) rotate(45deg); }
</style>
</head>
<body>

  <button class="icon" id="icon" aria-label="Toggle menu" aria-expanded="false">
    <span class="bar b1"></span>
    <span class="bar b2"></span>
    <span class="bar b3"></span>
  </button>

<script>
  const icon = document.getElementById('icon');
  icon.addEventListener('click', () => {
    icon.classList.toggle('open');
    icon.setAttribute('aria-expanded', icon.classList.contains('open'));
  });
</script>

</body>
</html>
